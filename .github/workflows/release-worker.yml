name: Worker and Relay Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  worker:
    name: Verified Worker distributions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Resolve and verify version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if [[ -z "$version" ]]; then version="${GITHUB_REF_NAME#v}"; fi
          project_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          test "$version" = "$project_version"
          git fetch --quiet origin main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Test release source
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          bwrap --ro-bind / / --dev /dev --proc /proc -- true
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          pytest -q
      - name: Build deterministic Worker assets
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/worker
          python packaging/build_worker_distribution.py \
            --output dist/worker/across-worker-source.tar.gz \
            --version "$VERSION" \
            --source-date-epoch "$(git show -s --format=%ct HEAD)"
          for platform in macos-arm64 macos-x86_64 linux-arm64 linux-x86_64; do
            cp dist/worker/across-worker-source.tar.gz "dist/worker/across-worker-${VERSION}-${platform}.tar.gz"
          done
          cp packaging/install_worker.py "dist/worker/install-worker-${VERSION}.py"
          (cd dist/worker && sha256sum * > SHA256SUMS)
      - name: Attest Worker artifacts
        uses: actions/attest@v4
        with:
          subject-path: dist/worker/*
      - uses: actions/upload-artifact@v7
        with:
          name: worker-release-assets
          path: dist/worker/*
          if-no-files-found: error
      - name: Attach Worker assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/worker/*
          fail_on_unmatched_files: true

  relay:
    name: Multi-architecture Relay image
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v4
      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          version="${{ inputs.version }}"
          if [[ -z "$version" ]]; then version="${GITHUB_REF_NAME#v}"; fi
          project_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          test "$version" = "$project_version"
          git fetch --quiet origin main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
          echo "name=ghcr.io/${owner}/across-relay" >> "$GITHUB_OUTPUT"
          echo "ref=ghcr.io/${owner}/across-relay:${version}" >> "$GITHUB_OUTPUT"
      - name: Build and publish Relay image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packaging/relay/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.ref }}
          provenance: mode=max
          sbom: true
      - name: Scan immutable Relay image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-relay.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Upload Relay security report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-relay.sarif
      - name: Sign Relay digest with GitHub OIDC
        env:
          COSIGN_YES: "true"
          IMAGE: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign "${IMAGE}@${DIGEST}"
      - name: Attest Relay image digest
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
